{% extends 'accounts/base.html' %}
{% load static %}

{% block title %}ورود به سامانه{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-header text-center bg-primary text-white">
                <h4><i class="fas fa-sign-in-alt"></i> ورود به حساب کاربری</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label">نام کاربری</label>
                        <input type="text" name="username" id="id_username" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="id_password" class="form-label">رمز عبور</label>
                        <input type="password" name="password" id="id_password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">ورود</button>
                </form>
            </div>
            <div class="card-footer text-center">
                <a href="{% url 'accounts:student_signup' %}">ثبت‌نام دانش‌آموز جدید</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
