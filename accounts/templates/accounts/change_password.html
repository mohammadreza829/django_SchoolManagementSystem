{% extends 'accounts/base.html' %}

{% block title %}تغییر رمز عبور{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-header bg-danger text-white">تغییر رمز عبور</div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}<div class="text-danger">{{ field.errors }}</div>{% endif %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-danger w-100">تغییر رمز</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
