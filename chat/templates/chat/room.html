<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>چت‌روم — {{ course.title }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root { color-scheme: light; }
    * { font-family: 'Vazirmatn', sans-serif; box-sizing: border-box; }
    body { margin: 0; background: #f3f5f9; color: #1a1f2e; }
    .wrap { max-width: 820px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
    .topbar { background: #ffffff; border-bottom: 1px solid rgba(15,23,42,0.09); padding: 14px 18px; display: flex; align-items: center; gap: 12px; box-shadow: 0 1px 0 rgba(15,23,42,0.03); }
    .topbar h1 { font-size: 16px; margin: 0; font-weight: 700; }
    .topbar a { color: #5a6477; text-decoration: none; font-size: 14px; }
    .topbar a:hover { color: #14192a; }
    .messages { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 78%; padding: 9px 13px; border-radius: 14px; background: #ffffff; border: 1px solid rgba(15,23,42,0.07); color: #1a1f2e; align-self: flex-start; }
    .msg.mine { align-self: flex-end; background: #6366f1; color: #fff; }
    .msg.announce { align-self: stretch; max-width: 100%; background: #22c55e22; border: 1px solid #22c55e88; }
    .msg .meta { font-size: 11px; opacity: 0.75; margin-bottom: 3px; }
    .msg .text { font-size: 14px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }
    .msg .time { font-size: 10px; opacity: 0.6; margin-top: 4px; text-align: left; }
    .composer { border-top: 1px solid rgba(15,23,42,0.09); background: #ffffff; padding: 12px 16px; }
    .composer form { display: flex; gap: 8px; align-items: center; }
    .composer input[type=text] { flex: 1; background: #f7f8fc; border: 1px solid rgba(15,23,42,0.12); color: #1a1f2e; border-radius: 10px; padding: 11px 14px; font-size: 14px; outline: none; }
    .composer input[type=text]:focus { border-color: #6366f1; }
    .composer button { background: #6366f1; color: #fff; border: none; border-radius: 10px; padding: 11px 18px; cursor: pointer; font-size: 14px; }
    .composer button:hover { background: #7c3aed; }
    .ann { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #22c55e; cursor: pointer; white-space: nowrap; }
    .empty { text-align: center; color: #6b7280; margin-top: 40px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="wrap" id="chat-root"
       data-messages-url="{% url 'chat:messages' course.id %}"
       data-send-url="{% url 'chat:send' course.id %}">
    <div class="topbar">
      <a href="{% url 'courses:course_detail' course.slug %}"><i class="fa-solid fa-arrow-right"></i></a>
      <i class="fa-solid fa-comments" style="color:#6366f1"></i>
      <h1>چت‌روم دوره: {{ course.title }}</h1>
    </div>

    <div class="messages" id="messages">
      <div class="empty" id="empty-state">هنوز پیامی نیست. اولین پیام را بفرستید 👋</div>
    </div>

    <div class="composer">
      <form id="send-form">
        {% csrf_token %}
        {% if is_teacher %}
        <label class="ann" title="پیام به‌عنوان اعلان رسمی نمایش داده می‌شود">
          <input type="checkbox" name="is_announcement" value="1"> اعلان
        </label>
        {% endif %}
        <input id="text-input" name="text" type="text" autocomplete="off" placeholder="پیام خود را بنویسید...">
        <button type="submit"><i class="fa-solid fa-paper-plane"></i></button>
      </form>
    </div>
  </div>

  <script>
  (function () {
    var root = document.getElementById("chat-root");
    var messagesUrl = root.dataset.messagesUrl;
    var sendUrl = root.dataset.sendUrl;
    var csrf = document.querySelector("[name=csrfmiddlewaretoken]").value;
    var box = document.getElementById("messages");
    var empty = document.getElementById("empty-state");
    var form = document.getElementById("send-form");
    var input = document.getElementById("text-input");
    var lastId = 0;
    var atBottom = true;

    box.addEventListener("scroll", function () {
      atBottom = (box.scrollHeight - box.scrollTop - box.clientHeight) < 60;
    });

    function esc(s) {
      var d = document.createElement("div");
      d.textContent = s == null ? "" : s;
      return d.innerHTML;
    }

    function render(m) {
      if (empty) { empty.style.display = "none"; }
      var wrap = document.createElement("div");
      var cls = "msg";
      if (m.is_mine) { cls += " mine"; }
      if (m.is_announcement) { cls += " announce"; }
      wrap.className = cls;
      var meta;
      if (m.is_announcement) {
        meta = "📢 اعلان • " + esc(m.sender);
      } else {
        meta = esc(m.sender) + (m.is_teacher ? " (استاد)" : "");
      }
      var html = "";
      html += '<div class="meta">' + meta + '</div>';
      html += '<div class="text">' + esc(m.text) + '</div>';
      html += '<div class="time">' + esc(m.time) + '</div>';
      wrap.innerHTML = html;
      box.appendChild(wrap);
    }

    function poll() {
      fetch(messagesUrl + "?after=" + lastId, {
        headers: { "X-Requested-With": "XMLHttpRequest" }
      })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (!data.messages || !data.messages.length) { return; }
          for (var i = 0; i < data.messages.length; i++) {
            var m = data.messages[i];
            render(m);
            if (m.id > lastId) { lastId = m.id; }
          }
          if (atBottom) { box.scrollTop = box.scrollHeight; }
        })
        .catch(function () {});
    }

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      var text = input.value.trim();
      if (!text) { return; }
      var body = new FormData(form);
      fetch(sendUrl, {
        method: "POST",
        headers: { "X-CSRFToken": csrf },
        body: body
      })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (data && data.ok) {
            input.value = "";
            var ann = form.querySelector("[name=is_announcement]");
            if (ann) { ann.checked = false; }
            poll();
          }
        })
        .catch(function () {});
    });

    poll();
    setInterval(poll, 4000);
  })();
  </script>
</body>
</html>
